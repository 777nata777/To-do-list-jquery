<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="stules.css">
    
</head>
<body class="body">

    <!-- Header -->
    <header>
        <div>
            <h1 class="headeer__title">Дела</h1>
            <div class="header__form">
              <img src="svg/chevron-down.svg" alt="стрелочка" width="30px">
              <input class="form-control" type="text" placeholder="Что должно быть сделано">
              <button type="submit" class="btn btn-primary">Добавить</button>
            </div>
            
        </div>
    </header><!-- /Header -->

    <!-- Main -->
    <main>
      <div class="main__form">
        <div class="form-check main__chech ps-5">
          <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault" checked>
          <label class="form-check-label" for="flexCheckDefault">
            1
          </label>
          <img class="main__img" src="svg/trash-can.svg" alt="корзина">
        </div>

        <div class="form-check main__chech ps-5">
          <input class="form-check-input" type="checkbox" value="" id="flexCheckChecked">
          <label class="form-check-label" for="flexCheckChecked">
            2
          </label>
          <img class="main__img" src="svg/trash-can.svg" alt="корзина">
        </div>

        <div class="form-check main__chech ps-5">
          <input class="form-check-input" type="checkbox" value="" id="flexCheckChecked">
          <label class="form-check-label" for="flexCheckChecked">
            3
          </label>
          <img class="main__img" src="svg/trash-can.svg" alt="корзина">
        </div>

        <div class="form-check main__chech ps-5">
          <input class="form-check-input" type="checkbox" value="" id="flexCheckChecked">
          <label class="form-check-label" for="flexCheckChecked">
            4
          </label>
          <img class="main__img" src="svg/trash-can.svg" alt="корзина">
        </div>
      </div>
    </main><!-- /Main -->

    <!-- Footer -->
    <footer class="footer">

        <span class="todo-count">
            1 действие!
        </span>

        <div>
          <button type="button" class="btn btn-dark btn-sm">Все</button>
          <button type="button" class="btn btn-light btn-sm">Активные</button>
          <button type="button" class="btn btn-light btn-sm">Завершенные</button>
        </div>

        <button type="submit" class="btn btn-primary btn-sm">Сделаные удалить</button>

    </footer><!-- /Footer -->

    <script src="app.js"></script>
</body>
</html>
